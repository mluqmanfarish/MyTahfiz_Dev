/* Custom Scan UI */
.qr-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
}

.scan-region-highlight {
    width: 60%;
    height: 60%;
    border: 2px solid var(--accent-blue);
    border-radius: 20px;
    box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
}

.qr-overlay p {
    color: white;
    margin-top: 20px;
    font-weight: 600;
    font-size: 0.9rem;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 3001;
}

.scan-region-highlight::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--accent-blue);
    box-shadow: 0 0 15px var(--accent-blue);
    animation: scanMove 2s infinite ease-in-out;
}

@keyframes scanMove {
    0% { top: 0%; }
    50% { top: 100%; }
    100% { top: 0%; }
}

/* Modal Entry Animation */
.qr-modal {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
}

    <script>
        /**
         * Responsive Hijri Date with Malaysian Spelling
         */
       function displayDates() {
    const today = new Date();
    
    // 1. Get Day Name (e.g., Friday)
    const dayName = new Intl.DateTimeFormat('ms-MY', { weekday: 'long' }).format(today);

    // 2. Custom Malaysian Hijri Months
    const msMonths = [
        "Muharram", "Safar", "Rabiulawal", "Rabiulakhir", 
        "Jamadilawal", "Jamadilakhir", "Rejab", "Syaaban", 
        "Ramadan", "Syawal", "Zulkaedah", "Zulhijjah"
    ];

    // 3. Get Hijri Components
    const hDay = new Intl.DateTimeFormat('en-u-ca-islamic', {day: 'numeric'}).format(today);
    const hMonthNum = new Intl.DateTimeFormat('en-u-ca-islamic', {month: 'numeric'}).format(today);
    const hYear = new Intl.DateTimeFormat('en-u-ca-islamic', {year: 'numeric'}).format(today);
    const hijriFull = `${hDay} ${msMonths[hMonthNum - 1]}, ${hYear}`;

    // 4. Get Gregorian Date (e.g., 24 April 2026)
    const gregFull = new Intl.DateTimeFormat('en-GB', { 
        day: 'numeric', 
        month: 'long', 
        year: 'numeric' 
    }).format(today);

    // Inject into HTML
    document.getElementById('hijri-row').innerText = `${dayName}, ${hijriFull}`;
    document.getElementById('gregorian-row').innerText = gregFull;
}

// Call on load
document.addEventListener('DOMContentLoaded', displayDates);
document.querySelector('.progress-fill').style.width = '85%';
document.querySelector('.progress-percentage').innerText = '85%';
   
// Initialize the Scanner
const html5QrCode = new Html5Qrcode("reader");
const qrModal = document.getElementById('qr-modal');

// Launch Scanner using your specific ID
document.getElementsByClassName('bento-item qr-btn')[0].addEventListener('click', (e) => {
    e.preventDefault();
    
    // Show the Glassmorphism Modal
    qrModal.style.display = 'flex';
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    // Start Camera (Environment = Back Camera)
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        (decodedText) => {
            // SUCCESS: Play a sound or vibrate here if you like
            console.log("QR Scanned:", decodedText);
            
            // Example action: Redirect or process student ID
            handleScanSuccess(decodedText);
            
            stopScanner();
        },
        (errorMessage) => {
            // This fires constantly while searching for a QR code, 
            // usually best to leave empty to avoid console clutter.
        }
    ).catch((err) => {
        alert("Kamera tidak dapat diakses. Sila pastikan kebenaran (permission) diberikan.");
        qrModal.style.display = 'none';
    });
});

// Function to stop camera and hide UI
function stopScanner() {
    html5QrCode.stop().then(() => {
        qrModal.style.display = 'none';
    }).catch((err) => console.error("Gagal menutup kamera", err));
}

// Close button logic
document.getElementById('close-qr').addEventListener('click', stopScanner);

// Placeholder for what happens after a successful scan
function handleScanSuccess(data) {
    // 1. Physical Feedback (Vibration)
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    // 2. Audio Feedback (Quick Beep)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch A
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);

    // 3. Visual Success State
    document.querySelector('.scan-region-highlight').style.borderColor = "#2ecc71";
    
    setTimeout(() => {
        alert("Kod Berjaya Diimbas: " + data);
        stopScanner();
    }, 500);


}
